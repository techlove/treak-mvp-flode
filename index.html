const b642buf = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(user, pass){
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey("raw", enc.encode(user + ":" + pass),
    {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b642buf(DATA.salt), iterations:DATA.iter, hash:"SHA-256"},
    keyMat, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b642buf(DATA.iv)}, key, b642buf(DATA.ct));
  return new TextDecoder().decode(plain);
}
const form = document.getElementById("gate");
const err = document.getElementById("err");
const go = document.getElementById("go");
form.addEventListener("submit", async (e)=>{
  e.preventDefault();
  err.textContent=""; go.disabled=true; go.textContent="Låser upp…";
  try{
    const html = await unlock(document.getElementById("u").value.trim(),
                              document.getElementById("p").value);
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent="Fel användare eller lösenord.";
    go.disabled=false; go.textContent="Visa";
  }
});
